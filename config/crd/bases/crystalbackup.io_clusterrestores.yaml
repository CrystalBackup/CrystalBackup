kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clusterrestores.crystalbackup.io
spec:
  group: crystalbackup.io
  names:
    kind: ClusterRestore
    listKind: ClusterRestoreList
    plural: clusterrestores
    shortNames:
    - crst
    singular: clusterrestore
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.target.namespace
      name: Target
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterRestore restores a namespace from a repository coordinate
          (admin, R14).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClusterRestore
            properties:
              clusterResources:
                description: clusterResources selects cluster-scoped resources to
                  restore (omitted ⇒ none; adr/0011).
                properties:
                  exclude:
                    description: exclude is applied after include.
                    items:
                      type: string
                    type: array
                  include:
                    description: include is a list of <group>/<Kind>[/<name>] globs.
                    items:
                      type: string
                    type: array
                type: object
              confirmation:
                description: confirmation must equal target.namespace when the operation
