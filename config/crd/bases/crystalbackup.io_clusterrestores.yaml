                enum:
                - Recreate
                - Overwrite
                type: string
              resources:
                description: resources selects manifests to restore (omitted with
                  volumes ⇒ whole namespace).
                items:
                  description: ResourceSelectorItem selects manifests to restore (AND
                    within an item, OR between items).
                  properties:
                    include:
                      description: include is a list of <group>/<Kind>[/<name>] globs.
                      items:
                        type: string
                      type: array
                    selector:
                      description: selector matches resources by label.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                  type: object
                type: array
              source:
                description: source is the repository coordinate to restore from.
                properties:
                  backup:
                    description: backup names a run; alternatively use time.
                    type: string
                  locationRef:
                    description: locationRef is the source ClusterBackupLocation.
                    properties:
                      name:
                        description: name of the referent.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  namespace:
                    description: namespace is the origin namespace (repository tag
                      filter).
                    minLength: 1
                    type: string
                  time:
                    description: time selects "latest" or an RFC3339 instant.
                    type: string
                    x-kubernetes-validations:
                    - message: time must be "latest" or an RFC3339 timestamp
                      rule: self == 'latest' || self.matches('^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}')
                required:
                - locationRef
                - namespace
                type: object
                x-kubernetes-validations:
                - message: exactly one of source.backup and source.time must be set
                  rule: has(self.backup) != has(self.time)
              target:
                description: target is where the restore lands.
                properties:
                  createNamespace:
                    description: createNamespace creates the target namespace if absent
                      (non-destructive).
                    type: boolean
                  namespace:
                    description: namespace to restore into.
                    minLength: 1
                    type: string
                  storageClassMapping:
                    additionalProperties:
                      type: string
                    description: storageClassMapping rewrites storageClassName on
                      restore.
                    type: object
                required:
                - namespace
                type: object
              volumes:
                description: volumes selects PVCs (and optionally files) to restore.
                items:
                  description: |-
                    VolumeSelectorItem selects PVCs (and optionally files within them) to restore.
                    When several items match the same PVC, the FIRST matching item wins (02-api.md).
                  properties:
                    exclude:
                      description: exclude is a list of file globs to skip.
                      items:
                        type: string
                      type: array
                    include:
                      description: include is a list of file globs within the selected
                        PVC(s) (partial restore, R7).
                      items:
                        type: string
                      type: array
                    names:
                      description: names of PVCs (whole-PVC restore).
                      items:
                        type: string
                      type: array
                    targetPath:
                      description: |-
                        targetPath overrides the restore root within the PVC (empty or "/" ⇒ the PVC root).
                        It is resolved inside the PVC and must not contain ".." segments.
                      type: string
                      x-kubernetes-validations:
                      - message: targetPath must not contain '..' segments
                        rule: '!self.split(''/'').exists(p, p == ''..'')'
                  type: object
                type: array
            required:
            - source
            - target
            type: object
          status:
            description: status defines the observed state of ClusterRestore
            properties:
              conditions:
                description: conditions represent the current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase of the restore.
                enum:
                - Pending
                - AwaitingConfirmation
                - Running
                - Completed
                - PartiallyFailed
                - Failed
                type: string
              restoredBytes:
                description: restoredBytes total.
                format: int64
                type: integer
              restoredResources:
                description: restoredResources count.
                format: int32
                type: integer
              restoredVolumes:
                description: restoredVolumes count.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
