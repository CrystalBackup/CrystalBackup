---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: backuplocations.crystalbackup.io
spec:
  group: crystalbackup.io
  names:
    kind: BackupLocation
    listKind: BackupLocationList
    plural: backuplocations
    shortNames:
    - bl
    singular: backuplocation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BackupLocation is a namespace user's own off-platform object
          storage + key.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of BackupLocation
            properties:
              clusterID:
                description: clusterID defaults from the default ClusterBackupLocation
                  if unset.
                type: string
              discovery:
                description: discovery projects Backup objects from this repository
                  into this namespace.
                properties:
                  enabled:
                    default: true
                    description: enabled turns on inventory and projection of Backup
                      objects from the repository.
                    type: boolean
                  interval:
                    default: 1h
                    description: interval between periodic discovery passes.
                    type: string
                type: object
              encryption:
                description: encryption configures the user-owned key (generated in
                  the namespace if unset).
                properties:
                  platformAccess:
                    description: |-
                      platformAccess, when true, also gives the operator a key slot for mediated
                      restore/verify; false (default) keeps the off-platform backups private.
                    type: boolean
                  repositoryPasswordSecretRef:
                    description: |-
                      repositoryPasswordSecretRef references the user-owned restic password Secret
                      (same namespace). If omitted the operator generates one and stores it in the
                      user's namespace (their key, their reversibility).
                    properties:
                      name:
                        description: name of the referent.
                        maxLength: 253
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                type: object
              mode:
                default: Standard
                description: mode selects Standard (prunable) or Immutable (object-lock;
                  no prune).
                enum:
                - Standard
                - Immutable
                type: string
              retention:
                description: |-
                  retention is the snapshot retention policy for this location's repository,
                  applied per PVC by a `restic forget` after each successful backup. It lives on
                  the location (not on BackupSchedules) so a single authoritative policy governs
                  the repository, mirroring ClusterBackupLocation. Standard mode only (reported
                  ignored on an Immutable location).
                properties:
                  keepDaily:
                    format: int32
                    type: integer
                  keepHourly:
                    format: int32
                    type: integer
                  keepLast:
                    format: int32
                    type: integer
                  keepMonthly:
                    format: int32
                    type: integer
                  keepWeekly:
                    format: int32
                    type: integer
                  keepYearly:
                    format: int32
                    type: integer
                type: object
              s3:
                description: s3 is the user's object storage.
                properties:
                  bucket:
                    description: bucket name.
                    minLength: 1
                    type: string
                  caBundle:
                    description: caBundle is an optional PEM CA bundle for the endpoint.
                    type: string
                  credentialsSecretRef:
                    description: |-
                      credentialsSecretRef references a Secret holding the S3 credentials (same
                      namespace as a BackupLocation, or crystal-backup-system for a ClusterBackupLocation).
                    properties:
                      name:
                        description: name of the referent.
                        maxLength: 253
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  endpoint:
                    description: endpoint URL of the S3-compatible service.
                    minLength: 1
                    type: string
                  forcePathStyle:
                    description: forcePathStyle selects path-style addressing (required
                      by most non-AWS gateways).
                    type: boolean
                  prefix:
                    description: prefix under which the single shared repository lives
                      (<prefix>/<clusterID>/).
                    type: string
                  region:
                    description: region of the bucket.
                    type: string
                required:
                - bucket
                - credentialsSecretRef
                - endpoint
                type: object
            required:
            - encryption
            - s3
            type: object
            x-kubernetes-validations:
            - message: spec.mode is immutable (create a new location to change it)
              rule: self.mode == oldSelf.mode
            - message: spec.clusterID is immutable
              rule: has(self.clusterID) == has(oldSelf.clusterID) && (!has(self.clusterID)
                || self.clusterID == oldSelf.clusterID)
            - message: spec.s3.endpoint is immutable (repository identity)
              rule: self.s3.endpoint == oldSelf.s3.endpoint
            - message: spec.s3.bucket is immutable (repository identity)
              rule: self.s3.bucket == oldSelf.s3.bucket
            - message: spec.s3.prefix is immutable (repository identity)
              rule: has(self.s3.prefix) == has(oldSelf.s3.prefix) && (!has(self.s3.prefix)
                || self.s3.prefix == oldSelf.s3.prefix)
          status:
            description: status defines the observed state of BackupLocation
            properties:
              conditions:
                description: conditions represent the current state (e.g. Ready, Reachable).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase is a short human-readable summary.
                type: string
              repositoryRef:
                description: repositoryRef names the BackupRepository backing this
                  location.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
