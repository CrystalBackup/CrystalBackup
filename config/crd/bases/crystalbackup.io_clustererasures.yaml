---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clustererasures.crystalbackup.io
spec:
  group: crystalbackup.io
  names:
    kind: ClusterErasure
    listKind: ClusterErasureList
    plural: clustererasures
    shortNames:
    - cer
    singular: clustererasure
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.snapshotsForgotten
      name: Forgotten
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterErasure erases a tenant/namespace/PVC from a location
          (right-to-erasure, R21).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClusterErasure
            properties:
              confirmation:
                description: |-
                  confirmation must equal the target identity (tenant, namespace, or <namespace>/<pvc>; R23).
                  Optional (not required) on purpose, mirroring Restore/ClusterRestore: an ABSENT/empty value is
                  admitted so the controller can park the erasure in phase AwaitingConfirmation until the operator
                  edits it in — the deliberate two-step for the destructive path. A required+MinLength=1 field
                  would be rejected by the API server's structural schema BEFORE the confirmation VAP runs, making
                  the AwaitingConfirmation phase unreachable and contradicting the admission policy (which admits
                  empty and denies only a non-matching non-empty value).
                type: string
              locationRef:
                description: locationRef is the ClusterBackupLocation to erase from.
                properties:
                  name:
                    description: name of the referent.
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              target:
                description: target selects exactly one erasure scope (tenant, namespace,
                  or namespace+pvc).
                properties:
                  namespace:
                    description: namespace erases all snapshots tagged namespace=<ns>.
                    type: string
                  pvc:
                    description: pvc, together with namespace, narrows erasure to
                      a single PVC.
                    type: string
                  tenant:
                    description: tenant erases all snapshots tagged tenant=<t>.
                    type: string
                type: object
            required:
            - locationRef
            - target
            type: object
          status:
            description: status defines the observed state of ClusterErasure
            properties:
              blockedUntil:
                description: blockedUntil is set on Immutable locations (object-lock
                  expiry).
                type: string
              conditions:
                description: conditions represent the current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase of the erasure.
                enum:
                - Pending
                - AwaitingConfirmation
                - Running
                - Completed
                - Blocked
                - Failed
                type: string
              reclaimedBytes:
                description: reclaimedBytes after prune.
                format: int64
                type: integer
              snapshotsForgotten:
                description: snapshotsForgotten count.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
