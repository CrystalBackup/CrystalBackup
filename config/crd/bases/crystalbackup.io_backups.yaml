---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: backups.crystalbackup.io
spec:
  group: crystalbackup.io
  names:
    kind: Backup
    listKind: BackupList
    plural: backups
    shortNames:
    - bk
    singular: backup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.locationRef.name
      name: Location
      type: string
    - jsonPath: .status.backupTime
      name: Backup-Time
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Backup is the execution unit and restore-point projection (source
          of truth = the repository).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Backup
            properties:
              locationRef:
                description: |-
                  locationRef is the backup location. On the namespace plane it is a BackupLocation;
                  a cluster-origin Backup references a ClusterBackupLocation.
                properties:
                  kind:
                    default: BackupLocation
                    description: kind of the referenced location.
                    enum:
                    - BackupLocation
                    - ClusterBackupLocation
                    type: string
                  name:
                    description: name of the referenced location.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              scheduleRef:
                description: scheduleRef names the originating schedule (empty for
                  manual/ad-hoc).
                type: string
            required:
            - locationRef
            type: object
          status:
            description: status defines the observed state of Backup
            properties:
              backupTime:
                description: backupTime is the point-in-time of the snapshot set.
                format: date-time
                type: string
              conditions:
                description: conditions represent the current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              manifests:
                description: manifests records the namespace-manifests snapshot.
                properties:
                  resourceCount:
                    description: resourceCount captured.
                    format: int32
                    type: integer
                  snapshotID:
                    description: snapshotID of the manifests snapshot.
                    type: string
                type: object
              phase:
                description: phase of the backup.
                enum:
                - Pending
                - SnapshottingHooks
                - Snapshotting
                - Uploading
                - Completed
                - PartiallyCompleted
                - PartiallyFailed
                - Failed
                type: string
              volumes:
                description: volumes is the per-PVC result set.
                items:
                  description: VolumeStatus is the per-PVC result within a Backup
                    projection.
                  properties:
                    addedBytes:
                      description: addedBytes is the deduplicated bytes added by this
                        backup (best-effort).
                      format: int64
                      type: integer
                    node:
                      description: node the mover ran on.
                      type: string
                    phase:
                      description: phase of this volume.
                      enum:
                      - Pending
                      - Snapshotting
                      - Uploading
                      - Completed
                      - Skipped
                      - Failed
                      type: string
                    pvc:
                      description: pvc name.
                      type: string
                    reason:
                      description: reason explains a non-Completed phase (e.g. CSISnapshotUnsupported).
                      type: string
                    sizeBytes:
                      description: sizeBytes is the logical size of the snapshot.
                      format: int64
                      type: integer
                    snapshotID:
                      description: snapshotID of the PVC data snapshot.
                      type: string
                  required:
                  - pvc
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
