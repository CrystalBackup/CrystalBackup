# This rule is not used by the project bs-k8s-backup itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over crystalbackup.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: bs-k8s-backup
    app.kubernetes.io/managed-by: kustomize
  name: clusterbackupexternalsync-admin-role
rules:
- apiGroups:
  - crystalbackup.io
  resources:
  - clusterbackupexternalsyncs
  verbs:
  - '*'
- apiGroups:
  - crystalbackup.io
  resources:
  - clusterbackupexternalsyncs/status
  verbs:
  - get
