{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "crystal-backup.namespace" . }}
  labels:
    {{- include "crystal-backup.labels" . | nindent 4 }}
    {{- with .Values.namespace.podSecurityLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
