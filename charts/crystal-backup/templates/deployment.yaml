apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crystal-backup.fullname" . }}
  namespace: {{ include "crystal-backup.namespace" . }}
  labels:
    {{- include "crystal-backup.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "crystal-backup.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "crystal-backup.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "crystal-backup.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "crystal-backup.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            - --health-probe-bind-address=:{{ .Values.health.port }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --leader-elect
            # The image every mover Job runs (crystal-mover + restic). Required for real backups;
            # digest-pinned via the moverImage helper. The operator reads no default for this — a
            # cluster that never sets it can init/inspect CRs but cannot move data.
            - --mover-image={{ include "crystal-backup.moverImage" . }}
            {{- if .Values.rbac.create }}
            # The manifest mover's identity and the ClusterRole the operator binds transiently
            # into a tenant namespace for a capture. Passed rather than derived: these names are
            # release-prefixed, so the operator must be told what the chart actually created.
            - --manifest-mover-service-account={{ include "crystal-backup.manifestMoverServiceAccountName" . }}
            - --manifest-reader-cluster-role={{ include "crystal-backup.fullname" . }}-manifest-reader
            # The restore-side grant. Separate from the reader on purpose: the operator hands
            # out whichever one the operation needs, and nothing binds both.
            - --manifest-writer-cluster-role={{ include "crystal-backup.fullname" . }}-manifest-writer
            # The cluster-scoped capture grant (adr/0011 §1), bound as a transient
            # ClusterRoleBinding for one ClusterBackup run. Enumerated, not "*".
            - --cluster-manifest-reader-cluster-role={{ include "crystal-backup.fullname" . }}-cluster-manifest-reader
            # The cluster-scoped RESTORE grant (adr/0011 §2) — the writer twin, bound as a
            # transient ClusterRoleBinding for one ClusterRestore. The most privileged grant in
            # the system; recreates CRDs and cluster RBAC. Enumerated, never standing.
            - --cluster-manifest-writer-cluster-role={{ include "crystal-backup.fullname" . }}-cluster-manifest-writer
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            # The operator's own namespace, surfaced via the downward API. --operator-namespace
            # defaults to $POD_NAMESPACE (see cmd/main.go): the one namespace holding the cluster
            # KEK, the wrapped DEKs, the DR S3 credentials, every per-Job creds Secret and all
            # mover Jobs (tenancy invariants I3/I5).
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if not .Values.admission.webhook.enabled }}
            # No webhook Service/cert is rendered: the manager must not register its webhook
            # server (it would fail readiness waiting for a serving cert that never comes).
            - name: ENABLE_WEBHOOKS
              value: "false"
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- if .Values.admission.webhook.enabled }}
            - name: webhook
              containerPort: 9443
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem: true ⇒ give the manager a writable scratch dir.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.admission.webhook.enabled }}
            # The chart-generated webhook serving certificate (webhook.yaml). The path is
            # controller-runtime's default CertDir, so no --webhook-cert-path flag is needed.
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.admission.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ include "crystal-backup.fullname" . }}-webhook-certs
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
