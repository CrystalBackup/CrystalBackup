apiVersion: v1
kind: Pod
metadata:
  annotations:
    sidecar.istio.io/status: '{"containers":["istio-proxy"]}'
  name: debug-shell
spec:
  containers:
  - image: alpine:3.20
    name: app
    volumeMounts:
    - mountPath: /work
      name: workdir
  - image: docker.io/istio/proxyv2:1.24.0
    name: istio-proxy
  priorityClassName: standard
  serviceAccountName: debug-sa
  volumes:
  - emptyDir: {}
    name: workdir
