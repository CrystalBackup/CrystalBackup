# Security scanning — the authoritative secret gate.
#
# Local pre-commit hooks (.pre-commit-config.yaml) give contributors fast
# feedback, but they are opt-in; this workflow runs on every push/PR regardless,
# so a secret can never reach `main` just because someone skipped the hooks.
#
# Two things run here:
#   1. gitleaks over the FULL git history (catches secrets in any commit of the
#      PR, not just the current tree) — the blocking gate.
#   2. the rest of the pre-commit suite (detect-private-key, large-files, YAML/JSON
#      validation, …) via `pre-commit run --all-files`, so the hooks are enforced
#      even without a local install.
name: Security

on:
  push:
    branches: [main]
  pull_request:

# No token scopes by default; the job opts in to read-only.
permissions: {}

env:
  # Keep these in sync with mise.toml ([tools] gitleaks / pre-commit).
  GITLEAKS_VERSION: "8.30.1"
  PRE_COMMIT_VERSION: "4.6.0"

jobs:
  secret-scan:
    name: Secret scan + pre-commit hooks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks — scan full git history
        run: gitleaks git --redact --verbose --config .gitleaks.toml .

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install "pre-commit==${PRE_COMMIT_VERSION}"

      - name: Run pre-commit hooks (gitleaks already scanned above)
        env:
          SKIP: gitleaks
        run: pre-commit run --all-files --show-diff-on-failure --color always
