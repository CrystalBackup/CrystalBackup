# Supply-chain image build for Crystal Backup (spec/adr/0012, spec/adr/0014).
#
# For BOTH images (operator, mover):
#   * cross-compile the Go binary for linux/amd64 + linux/arm64 (`go build`, no QEMU);
#   * melange-build the pinned restic engine from source (mover) + wrap each binary into a
#     signed local apk (build/melange/*.yaml) — the "context" apko assembles from;
#   * apko assembles a multi-arch INDEX on a Wolfi (glibc) base — one build, no emulation;
#   * generate an SPDX SBOM, run a trivy 0-known-CVE release gate (scan BEFORE push);
#   * cosign keyless-sign the index (Fulcio/Rekor) + attest the SBOM;
#   * attach SLSA build provenance (GitHub OIDC identity → SLSA L3);
#   * push to ghcr.io/crystalbackup/{operator,mover} by digest;
#   * generate an OpenVEX document from govulncheck and attest it AFTER publish — the
#     day-N answer for advisories that land on an already-immutable image. Kept refreshed
#     without rebuilding by .github/workflows/vex-refresh.yml (adr/0012).
#
# `image-dry-run` runs the whole build + CVE scan on PRs but never signs or pushes.
# Action versions are pinned; each job requests the minimum permissions it needs.
#
# The ONLY emulated step is melange cross-building restic's aarch64 apk from source (QEMU
# binfmt); apko/Go cross-compile natively. To drop that emulation, split the melange builds
# onto a native `ubuntu-24.04-arm` runner and merge the per-arch ./packages before apko.
name: images

on:
  push:
    tags:
      - "v*" # releases: git tag vX.Y.Z (adr/0014, SemVer; M_n -> 0.n.z, M0 -> 0.0.z)
  pull_request:
    paths:
      - "build/apko/**"
      - "build/melange/**"
      - "build/vex/**"
      - ".github/workflows/images.yml"
      - "cmd/**"
      - "api/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"

# Least privilege by default; jobs widen only where required.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: crystalbackup
  # Pinned toolchain — bump deliberately (see adr/0012 scheduled-rebuild note).
  GO_VERSION: "1.26.5" # matches mise.toml
  APKO_VERSION: "v1.2.25"
  MELANGE_VERSION: "v0.56.2"
  # VEX (adr/0012): govulncheck produces the statements, cosign attests them. No vexctl —
  # generation is govulncheck's job and re-keying is a jq transform, so a third tool would
  # only add a pin to track. Trivy CLI is pinned separately from trivy-action because the
  # action exposes no `--vex` input.
  GOVULNCHECK_VERSION: "v1.6.0"
  TRIVY_VERSION: "0.70.0"

jobs:
  # ===========================================================================
  # PR gate: build both images for both arches and CVE-scan them. Never sign,
  # never push. Read-only permissions (release-dry-run — DoD item 7, testing §7).
  # ===========================================================================
  image-dry-run:
    name: build + scan (${{ matrix.component }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: operator
            binary: manager
            source: ./cmd
            apko: build/apko/operator.yaml
            melange: build/melange/operator.yaml
            with_restic: "false"
          - component: mover
            binary: crystal-mover
            source: ./cmd/crystal-mover
            apko: build/apko/mover.yaml
            melange: build/melange/mover.yaml
            with_restic: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Gate — skip components whose binary is not in the tree yet
        id: gate
        run: |
          set -euo pipefail
          if [ "${{ matrix.component }}" = "operator" ] || [ -e "cmd/crystal-mover" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping mover::cmd/crystal-mover lands in M1 (spec/90-roadmap.md); mover image build deferred."
          fi

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: steps.gate.outputs.proceed == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set up QEMU (aarch64 melange build sandbox)
        if: steps.gate.outputs.proceed == 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Install apko + melange (pinned)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          go install "chainguard.dev/apko@${APKO_VERSION}"
          go install "chainguard.dev/melange@${MELANGE_VERSION}"
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      - name: Build Go binary (linux/amd64 + linux/arm64)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          mkdir -p stage-x86_64 stage-aarch64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o "stage-x86_64/${{ matrix.binary }}" "${{ matrix.source }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" -o "stage-aarch64/${{ matrix.binary }}" "${{ matrix.source }}"

      - name: melange — build pinned restic apk from source (mover only)
        if: steps.gate.outputs.proceed == 'true' && matrix.with_restic == 'true'
        run: |
          set -euo pipefail
          # Build each arch in its OWN melange invocation (not a single `--arch x86_64,aarch64`):
          # the combined multi-arch build intermittently races on melange's shared test workspace
          # under `--runner docker`, failing with "unable to populate workspace: open
          # build/melange/test-dirfs-0: no such file or directory". Per-arch is sequential, mirrors
          # the wrapper step below, and is artifact-identical (melange sandboxes each arch anyway).
          melange keygen
          for a in x86_64 aarch64; do
            melange build build/melange/restic.yaml \
              --arch "$a" --runner docker \
              --signing-key melange.rsa --out-dir ./packages
          done

      - name: melange — wrap the pre-built binary into a signed apk (per arch)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          [ -f melange.rsa ] || melange keygen
          for a in x86_64 aarch64; do
            melange build "${{ matrix.melange }}" \
              --arch "$a" --runner docker \
              --source-dir "stage-${a}" \
              --signing-key melange.rsa --out-dir ./packages
          done

      - name: apko — lock package versions (reproducible build)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          apko lock "${{ matrix.apko }}" \
            --arch x86_64,aarch64 \
            -r ./packages -k "${PWD}/melange.rsa.pub" \
            --output apko.lock.json

      - name: apko — build images locally (no push)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          mkdir -p ./sbom   # apko moves per-arch SBOMs here; it does not create the dir
          REF="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.component }}:pr-${GITHUB_SHA}"
          for a in x86_64 aarch64; do
            apko build "${{ matrix.apko }}" "$REF" "image-${a}.tar" \
              --arch "$a" --lockfile apko.lock.json \
              -r ./packages -k "${PWD}/melange.rsa.pub" \
              --sbom-path ./sbom
          done

      - name: trivy — 0-known-CVE gate (amd64)
        if: steps.gate.outputs.proceed == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          input: image-x86_64.tar
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          vuln-type: os,library
          exit-code: "1"

      - name: trivy — 0-known-CVE gate (arm64)
        if: steps.gate.outputs.proceed == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          input: image-aarch64.tar
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          vuln-type: os,library
          exit-code: "1"

  # ===========================================================================
  # Release: on git tag vX.Y.Z, build + scan (gate) then publish the multi-arch
  # index by digest, cosign-sign it, attest the SBOM, and attach SLSA provenance.
  # ===========================================================================
  images:
    name: release (${{ matrix.component }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      packages: write # push to GHCR
      id-token: write # cosign keyless + provenance (Fulcio/Rekor OIDC)
      attestations: write # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: operator
            binary: manager
            source: ./cmd
            apko: build/apko/operator.yaml
            melange: build/melange/operator.yaml
            with_restic: "false"
          - component: mover
            binary: crystal-mover
            source: ./cmd/crystal-mover
            apko: build/apko/mover.yaml
            melange: build/melange/mover.yaml
            with_restic: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Gate — skip components whose binary is not in the tree yet
        id: gate
        run: |
          set -euo pipefail
          if [ "${{ matrix.component }}" = "operator" ] || [ -e "cmd/crystal-mover" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping mover::cmd/crystal-mover lands in M1 (spec/90-roadmap.md); mover image release deferred."
          fi

      - name: Resolve release version from tag (adr/0014)
        if: steps.gate.outputs.proceed == 'true'
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: steps.gate.outputs.proceed == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set up QEMU (aarch64 melange build sandbox)
        if: steps.gate.outputs.proceed == 'true'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Install apko + melange (pinned)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          go install "chainguard.dev/apko@${APKO_VERSION}"
          go install "chainguard.dev/melange@${MELANGE_VERSION}"
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: steps.gate.outputs.proceed == 'true'

      - name: Log in to GHCR
        if: steps.gate.outputs.proceed == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Go binary (linux/amd64 + linux/arm64)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          mkdir -p stage-x86_64 stage-aarch64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o "stage-x86_64/${{ matrix.binary }}" "${{ matrix.source }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" -o "stage-aarch64/${{ matrix.binary }}" "${{ matrix.source }}"

      - name: Stamp the release version into the wrapper apk (SBOM accuracy)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          # apk (and thus melange) versions are NOT SemVer: a pre-release like
          # "0.1.0-alpha.1" is rejected by melange's parser. Map SemVer -> apk for the apk
          # package version only: drop +build metadata, and rewrite the pre-release
          # (-alpha.1 -> _alpha1) into apk's suffix form (alpha/beta/pre/rc are valid apk
          # suffixes). The immutable OCI image tag keeps the full SemVer ${VERSION}; only the
          # apk package version (SBOM cosmetic) is sanitized here.
          APK_VERSION="${VERSION%%+*}"
          APK_VERSION="$(printf '%s' "$APK_VERSION" | sed -E 's/-([A-Za-z]+)\.?([0-9]*)/_\1\2/g; s/[^A-Za-z0-9._]/_/g')"
          echo "apk package version: ${APK_VERSION} (OCI tag stays ${VERSION})"
          sed -i "0,/^  version:/ s|^  version:.*|  version: \"${APK_VERSION}\"|" "${{ matrix.melange }}"

      - name: melange — build pinned restic apk from source (mover only)
        if: steps.gate.outputs.proceed == 'true' && matrix.with_restic == 'true'
        run: |
          set -euo pipefail
          # Build each arch in its OWN melange invocation (not a single `--arch x86_64,aarch64`):
          # the combined multi-arch build intermittently races on melange's shared test workspace
          # under `--runner docker`, failing with "unable to populate workspace: open
          # build/melange/test-dirfs-0: no such file or directory". Per-arch is sequential, mirrors
          # the wrapper step below, and is artifact-identical (melange sandboxes each arch anyway).
          melange keygen
          for a in x86_64 aarch64; do
            melange build build/melange/restic.yaml \
              --arch "$a" --runner docker \
              --signing-key melange.rsa --out-dir ./packages
          done

      - name: melange — wrap the pre-built binary into a signed apk (per arch)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          [ -f melange.rsa ] || melange keygen
          for a in x86_64 aarch64; do
            melange build "${{ matrix.melange }}" \
              --arch "$a" --runner docker \
              --source-dir "stage-${a}" \
              --signing-key melange.rsa --out-dir ./packages
          done

      - name: apko — lock package versions (reproducible build)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          apko lock "${{ matrix.apko }}" \
            --arch x86_64,aarch64 \
            -r ./packages -k "${PWD}/melange.rsa.pub" \
            --output apko.lock.json

      - name: apko — build images locally for the CVE gate (same lockfile as publish)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          mkdir -p ./sbom   # apko moves per-arch SBOMs here; it does not create the dir
          REF="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.component }}:${VERSION}"
          for a in x86_64 aarch64; do
            apko build "${{ matrix.apko }}" "$REF" "image-${a}.tar" \
              --arch "$a" --lockfile apko.lock.json \
              -r ./packages -k "${PWD}/melange.rsa.pub" \
              --sbom-path ./sbom
          done

      - name: trivy — 0-known-CVE release gate (amd64)
        if: steps.gate.outputs.proceed == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          input: image-x86_64.tar
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          vuln-type: os,library
          exit-code: "1"

      - name: trivy — 0-known-CVE release gate (arm64)
        if: steps.gate.outputs.proceed == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          input: image-aarch64.tar
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          vuln-type: os,library
          exit-code: "1"

      - name: apko — publish multi-arch index to GHCR (by digest)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          apko publish "${{ matrix.apko }}" \
            "${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.component }}:${VERSION}" \
            --arch x86_64,aarch64 --lockfile apko.lock.json \
            -r ./packages -k "${PWD}/melange.rsa.pub" \
            --sbom-path ./sbom --image-refs image-refs.txt
          REF="$(head -n1 image-refs.txt)"
          NAME="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.component }}"
          DIGEST="${REF##*@}"        # sha256:... of the multi-arch index
          echo "IMAGE_NAME=${NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${NAME}@${DIGEST}" >> "$GITHUB_ENV"

      - name: cosign — keyless-sign the index
        if: steps.gate.outputs.proceed == 'true'
        env:
          COSIGN_YES: "true"
        run: cosign sign --yes "${IMAGE_REF}"

      - name: cosign — attest the SPDX SBOM (keyless)
        if: steps.gate.outputs.proceed == 'true'
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          PRED="$(ls ./sbom/*index*.spdx.json 2>/dev/null | head -n1 || true)"
          [ -n "$PRED" ] || PRED="$(ls ./sbom/*.spdx.json | head -n1)"
          cosign attest --yes --type spdxjson --predicate "$PRED" "${IMAGE_REF}"

      # --- VEX (adr/0012) ------------------------------------------------------------------
      # Deliberately AFTER publish, never before. The CVE gate above scans a local tarball
      # that has no OCI purl, so no VEX statement could be keyed to it even in principle —
      # and more importantly, a CVE found before push must be FIXED, not asserted away. VEX
      # answers the day-N question instead: an advisory landing against an image that is
      # already immutable, where rebuilding is no longer the available move.
      - name: Install govulncheck (pinned)
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      - name: Install trivy CLI (pinned)
        if: steps.gate.outputs.proceed == 'true'
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v${{ env.TRIVY_VERSION }}

      - name: govulncheck — generate the OpenVEX document for the published digest
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          # Ask the scanner for the product identifiers rather than hand-building purl
          # strings: the purl shape (including its arch= qualifier) is the scanner's
          # business, and a guessed identifier silently matches nothing.
          REFS=()
          for platform in linux/amd64 linux/arm64; do
            purl="$(trivy image "${IMAGE_REF}" --platform "$platform" \
                      --scanners vuln --format cyclonedx --quiet 2>/dev/null \
                    | jq -r '.metadata.component.purl // empty')"
            if [ -n "$purl" ]; then
              REFS+=(--image-ref "$purl")
              echo "product (${platform}): ${purl}"
            else
              echo "::warning title=No purl for ${platform}::the VEX document will not cover ${platform}"
            fi
          done
          [ "${#REFS[@]}" -gt 0 ] || { echo "no product identifier resolved; refusing to attest an unusable VEX" >&2; exit 1; }

          ./build/vex/generate-vex.sh \
            --component "${{ matrix.component }}" \
            --output "vex-${{ matrix.component }}.openvex.json" \
            "${REFS[@]}"

      - name: Refuse to release with a reachable vulnerability
        if: steps.gate.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          DOC="vex-${{ matrix.component }}.openvex.json"
          AFFECTED="$(jq -r '[.statements[] | select(.status == "affected")] | length' "$DOC")"
          if [ "$AFFECTED" != "0" ]; then
            echo "::error title=Reachable vulnerability::${AFFECTED} advisory/advisories are reachable in ${{ matrix.component }}."
            jq -r '.statements[] | select(.status == "affected")
                   | "  \(.vulnerability.name)  \(.vulnerability.aliases // [] | join(", "))  \(.vulnerability.description)"' "$DOC"
            echo "A reachable advisory is a bug to fix, not a statement to publish. Bump the dependency."
            exit 1
          fi
          echo "no reachable advisory; $(jq -r '.statements | length' "$DOC") statement(s) to attest"

      - name: cosign — attest the OpenVEX document (keyless)
        if: steps.gate.outputs.proceed == 'true'
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          cosign attest --yes --type openvex \
            --predicate "vex-${{ matrix.component }}.openvex.json" "${IMAGE_REF}"

      - name: SLSA build provenance (SLSA L3, keyless) → GHCR
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true

  # ===========================================================================
  # Release: publish the Helm chart as an OCI artifact and cut the GitHub
  # Release. Runs only AFTER both images are published (needs: images), so the
  # chart pins operator + mover by their freshly-pushed multi-arch INDEX digests
  # (adr/0012 "by digest"; adr/0014 one release train). The chart .tgz is added
  # as a release asset; GitHub auto-attaches the source archives.
  # ===========================================================================
  chart-and-release:
    name: chart (OCI) + GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # helm push the chart to GHCR (OCI)
      id-token: write # cosign keyless-sign the chart (Fulcio/Rekor OIDC)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve release version from tag (adr/0014)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.17.0

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Log in to GHCR (docker for digest lookup, helm for the OCI push)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Resolve the published image index digests
        run: |
          set -euo pipefail
          op="$(docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAMESPACE}/operator:${VERSION}" --format '{{.Manifest.Digest}}')"
          mv="$(docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAMESPACE}/mover:${VERSION}" --format '{{.Manifest.Digest}}')"
          [ -n "$op" ] && [ -n "$mv" ] || { echo "could not resolve operator/mover digests for ${VERSION}" >&2; exit 1; }
          echo "OPERATOR_DIGEST=${op}" >> "$GITHUB_ENV"
          echo "MOVER_DIGEST=${mv}" >> "$GITHUB_ENV"
          echo "pinning operator@${op}  mover@${mv}"

      - name: Stamp the chart (appVersion + immutable image digests) and sync CRDs
        run: |
          set -euo pipefail
          # One release train: the chart appVersion tracks the release (adr/0014); the chart's own
          # `version` is already SemVer-pinned in Chart.yaml and names the .tgz.
          VERSION="${VERSION}" yq -i '.appVersion = strenv(VERSION)' charts/crystal-backup/Chart.yaml
          OPERATOR_DIGEST="${OPERATOR_DIGEST}" yq -i '.image.digest = strenv(OPERATOR_DIGEST)' charts/crystal-backup/values.yaml
          MOVER_DIGEST="${MOVER_DIGEST}" yq -i '.mover.image.digest = strenv(MOVER_DIGEST)' charts/crystal-backup/values.yaml
          # Helm installs crds/ on first install; sync the generated CRDs into the chart (the chart
          # keeps crds/ git-ignored, same as deploy/deploy.sh does for the crucible).
          mkdir -p charts/crystal-backup/crds
          cp config/crd/bases/*.yaml charts/crystal-backup/crds/

      - name: Package + publish the chart as an OCI artifact, cosign-signed
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          mkdir -p dist
          helm lint charts/crystal-backup
          helm package charts/crystal-backup --destination dist
          tgz="$(ls dist/crystal-backup-*.tgz)"
          helm push "${tgz}" "oci://${REGISTRY}/${IMAGE_NAMESPACE}/charts" 2>&1 | tee push.log
          digest="$(grep -oE 'sha256:[0-9a-f]{64}' push.log | head -n1)"
          [ -n "$digest" ] || { echo "helm push did not report a digest" >&2; exit 1; }
          cosign sign --yes "${REGISTRY}/${IMAGE_NAMESPACE}/charts/crystal-backup@${digest}"
          echo "CHART_TGZ=${tgz}" >> "$GITHUB_ENV"

      - name: Cut the GitHub Release (chart .tgz asset + auto source archives)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${CHART_TGZ}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes "${CHART_TGZ}"
          fi
