# Rook Ceph cluster for crucible.
# Placement per the crucible contract:
#   mon + mgr    -> masters  (crystalbackup.io/node-role=master)
#   osd + mds    -> workers  (crystalbackup.io/node-role=worker)
# OSDs consume the raw hcloud volume attached to each worker (/dev/sdb).
# No CephObjectStore/RGW here — production (core/argocd-bseufr) runs none, and
# it isn't exercised until a milestone tests object-store backup; keeping the
# pool count low keeps 3x 40 GB OSDs comfortably at HEALTH_OK.
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    # Pinned; bump together with ROOK_CHART_VERSION in ../deploy.sh.
    image: quay.io/ceph/ceph:v19.2.2
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    allowMultiplePerNode: false
  dashboard:
    enabled: false
  monitoring:
    enabled: false
  crashCollector:
    disable: true
  placement:
    mon:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: crystalbackup.io/node-role
                  operator: In
                  values: ["master"]
    mgr:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: crystalbackup.io/node-role
                  operator: In
                  values: ["master"]
    osd:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: crystalbackup.io/node-role
                  operator: In
                  values: ["worker"]
  storage:
    useAllNodes: true
    useAllDevices: false
    # The hcloud volume shows up as /dev/sdb on the workers (masters have none).
    deviceFilter: "^sd[bc]$"
---
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: blockpool
  namespace: rook-ceph
spec:
  failureDomain: host
  replicated:
    size: 3
---
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: cephfs
  namespace: rook-ceph
spec:
  metadataPool:
    replicated:
      size: 3
  dataPools:
    - name: data0
      failureDomain: host
      replicated:
        size: 3
  preserveFilesystemOnDelete: false
  metadataServer:
    activeCount: 1
    activeStandby: true
    placement:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: crystalbackup.io/node-role
                  operator: In
                  values: ["worker"]
