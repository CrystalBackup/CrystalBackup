# c-web — the "manifests only" tenant: a full app surface with NO storage.
# Exercises the manifest capture matrix (Deployment, Service, Ingress,
# ConfigMap, Secret, NetworkPolicy) from M2 onward.
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: c-web
  labels:
    app.kubernetes.io/part-of: crucible-seed
data:
  index.html: |
    <!doctype html><title>c-web</title><h1>crucible seed: c-web</h1>
---
apiVersion: v1
kind: Secret
metadata:
  name: web-secret
  namespace: c-web
  labels:
    app.kubernetes.io/part-of: crucible-seed
type: Opaque
stringData:
  api-key: not-a-real-secret-seed-data-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: c-web
  labels:
    app.kubernetes.io/part-of: crucible-seed
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        app.kubernetes.io/part-of: crucible-seed
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
      volumes:
        - name: content
          configMap:
            name: web-config
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: c-web
  labels:
    app.kubernetes.io/part-of: crucible-seed
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: c-web
  labels:
    app.kubernetes.io/part-of: crucible-seed
spec:
  ingressClassName: nginx
  rules:
    - host: c-web.crucible.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-http
  namespace: c-web
  labels:
    app.kubernetes.io/part-of: crucible-seed
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - port: 80
          protocol: TCP
