# c-empty — policy-only namespace: no pods, no PVCs. Manifest backup of an
# "empty" tenant must still capture (and restore) these.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: c-empty
  labels:
    app.kubernetes.io/part-of: crucible-seed
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: c-empty
  labels:
    app.kubernetes.io/part-of: crucible-seed
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 10m
        memory: 32Mi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-viewer
  namespace: c-empty
  labels:
    app.kubernetes.io/part-of: crucible-seed
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-viewer
  namespace: c-empty
  labels:
    app.kubernetes.io/part-of: crucible-seed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-viewer
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: crucible:tenants
