---
# Crucible cluster provisioning: RKE2 HA (3 servers + 3 agents) on Hetzner.
# Inventory is generated by terraform (inventory/hosts.ini).

- name: Prepare all nodes
  hosts: k8s
  gather_facts: true
  roles:
    - common

- name: Install RKE2 servers (first bootstraps, others join)
  hosts: masters
  serial: 1
  roles:
    - rke2_server

- name: Install RKE2 agents
  hosts: workers
  roles:
    - rke2_agent

- name: Wait for the full cluster and fetch the kubeconfig
  hosts: masters[0]
  tasks:
    - name: Wait until all nodes are Ready
      ansible.builtin.command:
        cmd: >
          /var/lib/rancher/rke2/bin/kubectl
          --kubeconfig /etc/rancher/rke2/rke2.yaml
          wait --for=condition=Ready node --all --timeout=60s
      register: nodes_ready
      retries: 20
      delay: 15
      until: nodes_ready.rc == 0
      changed_when: false

    - name: Fetch kubeconfig
      ansible.builtin.fetch:
        src: /etc/rancher/rke2/rke2.yaml
        dest: ../artifacts/kubeconfig
        flat: true

    - name: Point the kubeconfig at the first master's public IP
      delegate_to: localhost
      ansible.builtin.replace:
        path: ../artifacts/kubeconfig
        regexp: "https://127\\.0\\.0\\.1:6443"
        replace: "https://{{ first_master_public_ip }}:6443"

    - name: Restrict kubeconfig permissions
      delegate_to: localhost
      ansible.builtin.file:
        path: ../artifacts/kubeconfig
        mode: "0600"
