# Gitleaks configuration for Crystal Backup.
# Extends the built-in ruleset (do not replace it) and adds narrow allowlists
# for known-safe files. Kept deliberately small: real secrets live in the
# git-ignored .secrets/ directory and must NEVER be silenced here.
title = "Crystal Backup gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Credential example/template files carry placeholders, not secrets"
paths = [
  '''test/crucible/secrets\.example/.*''',
]

[[allowlists]]
description = "Placeholder image digest in the Helm chart (all-zero sha256, not a secret)"
regexTarget = "line"
regexes = [
  '''sha256:0{64}''',
]

[[allowlists]]
description = "Key-handling unit tests use FABRICATED / invalid age keys as fixtures (e.g. \"not-an-age-secret-key\", \"AGE-SECRET-KEY-1-garbage\") to prove the parser rejects them — never real secrets. Real keys live in the git-ignored .secrets/."
paths = [
  '''internal/keys/keys_test\.go''',
]

[[allowlists]]
description = "The sanitization golden corpus is FIXTURE Kubernetes objects (spec/adr/0007). It necessarily contains Secret-shaped manifests — proving Secrets are captured, excluded or emptied correctly is the point of several cases — and their values are fabricated. Narrowed to the corpus directory so a real secret anywhere else is still caught."
paths = [
  '''internal/sanitize/testdata/.*''',
]
